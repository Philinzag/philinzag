name: Update Profile README

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Currently-Building secret is configured
        id: gate
        env:
          TOKEN: ${{ secrets.PROFILE_READER_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "PROFILE_READER_TOKEN not configured. Skipping Currently Building auto-update (other patches still run)."
            echo "skip_currently_building=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_currently_building=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build exclude list
        if: steps.gate.outputs.skip_currently_building == 'false'
        run: |
          # Read .github/profile-exclude.txt, strip comments + blanks, lowercase, emit as JSON array.
          if [ -f .github/profile-exclude.txt ]; then
            python3 <<'PY' > exclude.json
          import json
          names = []
          with open('.github/profile-exclude.txt', encoding='utf-8') as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith('#'):
                      continue
                  names.append(line.lower())
          print(json.dumps(names))
          PY
          else
            echo "[]" > exclude.json
          fi
          echo "Excluding: $(cat exclude.json)"

      - name: Fetch most-recently-pushed repos
        if: steps.gate.outputs.skip_currently_building == 'false'
        env:
          GH_TOKEN: ${{ secrets.PROFILE_READER_TOKEN }}
        run: |
          gh api -X GET user/repos \
            -f sort=pushed \
            -f per_page=50 \
            -f affiliation=owner,collaborator,organization_member \
            > all_repos.json

          jq --slurpfile excl exclude.json '
            [.[]
              | select(.fork==false)
              | select(.archived==false)
              | select((.name|ascii_downcase) != "philinzag")
              | select(([.name | ascii_downcase] | inside($excl[0])) | not)
            ] | sort_by(.pushed_at) | reverse | .[:4]
          ' all_repos.json > top.json

          echo "Top repos selected (after exclusion):"
          jq '.[] | {name, private, owner: .owner.login, pushed_at}' top.json

      - name: Patch Currently Building section
        if: steps.gate.outputs.skip_currently_building == 'false'
        run: |
          python3 <<'PY'
          import json, re
          with open('top.json', encoding='utf-8') as f:
              repos = json.load(f)
          icons = ["🤖", "🏢", "💼", "⚡"]
          lines = ["<!-- CURRENTLY_BUILDING:START -->"]
          if not repos:
              lines.append("- _No recent activity detected._")
          for i, r in enumerate(repos):
              icon = icons[i] if i < len(icons) else "🛠️"
              name = r["name"]
              desc = (r.get("description") or "Active development").strip()
              if r.get("private"):
                  lines.append(f"- {icon} **{name}** — {desc} *(private)*")
              else:
                  url = r["html_url"]
                  lines.append(f"- {icon} **[{name}]({url})** — {desc}")
          lines.append("<!-- CURRENTLY_BUILDING:END -->")
          new_block = "\n".join(lines)

          with open('README.md', encoding='utf-8') as f:
              s = f.read()
          pattern = re.compile(
              r"<!-- CURRENTLY_BUILDING:START -->.*?<!-- CURRENTLY_BUILDING:END -->",
              re.DOTALL,
          )
          if not pattern.search(s):
              raise SystemExit("CURRENTLY_BUILDING markers not found.")
          s2 = pattern.sub(new_block, s)
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(s2)
          print("Currently Building patched.")
          PY

      - name: Fetch and patch self-hosted stats
        if: steps.gate.outputs.skip_currently_building == 'false'
        env:
          GH_TOKEN: ${{ secrets.PROFILE_READER_TOKEN }}
        run: |
          YEAR=$(date -u +%Y)
          gh api graphql \
            -F from="${YEAR}-01-01T00:00:00Z" \
            -F to="${YEAR}-12-31T23:59:59Z" \
            -f query='
              query($from: DateTime!, $to: DateTime!) {
                viewer {
                  contributionsCollection(from: $from, to: $to) {
                    totalCommitContributions
                    totalIssueContributions
                    totalPullRequestContributions
                    restrictedContributionsCount
                  }
                  pullRequests(states: [OPEN, MERGED, CLOSED]) { totalCount }
                  issues(states: [OPEN, CLOSED]) { totalCount }
                  starredRepositories { totalCount }
                  repositories(privacy: PUBLIC, ownerAffiliations: OWNER, isFork: false) { totalCount }
                }
              }
            ' > stats.json
          echo "Raw stats summary:"
          jq '.data.viewer | {
            commits_year: (.contributionsCollection.totalCommitContributions + .contributionsCollection.restrictedContributionsCount),
            prs_total: .pullRequests.totalCount,
            issues_total: .issues.totalCount,
            stars_given: .starredRepositories.totalCount,
            public_repos: .repositories.totalCount
          }' stats.json

          python3 <<'PY'
          import json, re
          from datetime import datetime, timezone

          with open('stats.json', encoding='utf-8') as f:
              data = json.load(f)["data"]["viewer"]
          cc = data["contributionsCollection"]
          year = datetime.now(timezone.utc).year

          commits_year = cc["totalCommitContributions"] + cc["restrictedContributionsCount"]
          prs_total = data["pullRequests"]["totalCount"]
          issues_total = data["issues"]["totalCount"]
          public_repos = data["repositories"]["totalCount"]
          stars_given = data["starredRepositories"]["totalCount"]

          def fmt(n):
              # URL-encode comma for shields.io
              return f"{n:,}".replace(",", "%2C")

          color = "22D3EE"
          style = "for-the-badge"
          badges = [
              (f"{year}%20Commits", fmt(commits_year), "git", color),
              ("Total%20PRs", fmt(prs_total), "github", color),
              ("Total%20Issues", fmt(issues_total), "githubissues", color),
              ("Public%20Repos", fmt(public_repos), "github", color),
              ("Stars%20Given", fmt(stars_given), "starship", color),
          ]
          badge_imgs = "\n".join(
              f'  <img src="https://img.shields.io/badge/{label}-{value}-{c}?style={style}&logo={logo}&logoColor=white" alt="{label}: {value}" />'
              for label, value, logo, c in badges
          )

          new_block = (
              "<!-- STATS:START -->\n"
              '<p align="center">\n'
              f"{badge_imgs}\n"
              "</p>\n"
              '<p align="center"><sub><em>Includes private contributions. Auto-updated daily.</em></sub></p>\n'
              "<!-- STATS:END -->"
          )

          with open('README.md', encoding='utf-8') as f:
              s = f.read()
          pattern = re.compile(
              r"<!-- STATS:START -->.*?<!-- STATS:END -->",
              re.DOTALL,
          )
          if not pattern.search(s):
              raise SystemExit("STATS markers not found.")
          s2 = pattern.sub(new_block, s)
          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(s2)
          print(f"Stats patched: {commits_year} commits, {prs_total} PRs, {issues_total} issues, {public_repos} public repos, {stars_given} stars given.")
          PY

      - name: Patch tenure year count and last-updated stamp
        run: |
          python3 <<'PY'
          import re
          from datetime import datetime, timezone

          now = datetime.now(timezone.utc)
          years = now.year - 2013
          month_year = now.strftime("%B %Y")

          with open('README.md', encoding='utf-8') as f:
              s = f.read()

          tenure_pat = re.compile(r"(\d{1,2})(%2B\+years\+in\+engineering)")
          if tenure_pat.search(s):
              s = tenure_pat.sub(lambda m: f"{years}{m.group(2)}", s)
              print(f"Tenure patched to {years}+ years.")
          else:
              print("Tenure pattern not found in URL — skipping.")

          last_pat = re.compile(
              r"<!-- LAST_UPDATED:START -->.*?<!-- LAST_UPDATED:END -->",
              re.DOTALL,
          )
          if last_pat.search(s):
              s = last_pat.sub(
                  f"<!-- LAST_UPDATED:START -->Last updated: {month_year}<!-- LAST_UPDATED:END -->",
                  s,
              )
              print(f"Last-updated stamped: {month_year}.")
          else:
              print("LAST_UPDATED markers not found — skipping.")

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(s)
          PY

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): auto-update profile (currently building / stats / tenure / timestamp)"
          git push
